<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fffb1e, #e70707);
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: white;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            box-shadow: 0 0 5px #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ffffff;
            color: #a24b6c;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #f1efef;
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🏠 House Price Prediction</h1>

    <form action="/predict" method="POST">

        <div class="input-group">
            <label>Area (sq ft)</label>
            <input type="number" name="area" required>
        </div>

        <div class="input-group">
            <label>Bedrooms</label>
            <input type="number" name="bedroom" required>
        </div>

        <div class="input-group">
            <label>Age (years)</label>
            <input type="number" name="age" required>
        </div>

        <input type="submit" value="predict_price">

    </form>
    
        <div class="result">
        Predicted Price: ₹ {{ prediction_text }}
    </div>
</div>
    
</div>

</body>
</html>
